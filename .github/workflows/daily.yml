name: Daily Pulse

on:
  workflow_dispatch:

  schedule:
    - cron: '30 2 * * *'

jobs:
  run-bot:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - run: pip install -r requirements.txt

      - run: python bot.py

      - uses: actions/upload-artifact@v4
        with:
          name: pulse-report
          path: summary.txt
